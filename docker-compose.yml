version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum_password
      POSTGRES_DB: forum
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: change-me-master-key
    ports:
      - '7700:7700'
    volumes:
      - meilidata:/meili_data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  api:
    build: .
    depends_on:
      - postgres
      - redis
      - meilisearch
      - minio
    environment:
      DATABASE_URL: postgresql://forum:forum_password@postgres:5432/forum?schema=public
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
    ports:
      - '3001:3001'

volumes:
  pgdata:
  meilidata:
  miniodata:
