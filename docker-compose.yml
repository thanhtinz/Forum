version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum_password
      POSTGRES_DB: forum
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: change-me-master-key
    ports:
      - '7700:7700'
    volumes:
      - meilidata:/meili_data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  # 1 service duy nhất: build cả frontend + backend, phục vụ chung tại :3001
  # (NestJS serve frontend tĩnh + API /api cùng origin — không tách build/deploy)
  app:
    build: .
    depends_on:
      - postgres
      - redis
      - meilisearch
      - minio
    environment:
      DATABASE_URL: postgresql://forum:forum_password@postgres:5432/forum?schema=public
      REDIS_URL: redis://redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      FRONTEND_URL: http://localhost:3000
      PORT: 3001
      AUTO_SEED: 'true'
      # Lưu trữ media (MinIO) — dùng path-style
      MEDIA_ENDPOINT: http://minio:9000
      MEDIA_REGION: us-east-1
      MEDIA_BUCKET: forum-media
      MEDIA_ACCESS_KEY: minioadmin
      MEDIA_SECRET_KEY: minioadmin
      MEDIA_FORCE_PATH_STYLE: 'true'
      MEDIA_PUBLIC_URL: http://localhost:9000/forum-media
    ports:
      - '3001:3001'

volumes:
  pgdata:
  meilidata:
  miniodata:
